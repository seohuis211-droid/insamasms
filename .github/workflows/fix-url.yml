name: Final Premium Overlay Fix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject-overlay:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Overlay Safely
        run: |
          # 오늘 날짜
          TODAY="2026년 03월 25일(수)"

          # HTML 파일들을 찾아서 하나씩 작업
          find . -name "*.html" | while read -r file; do
            FILENAME=$(basename "$file" .html)
            REGION=$(echo "$FILENAME" | cut -d'_' -f1)
            KEYWORD=$(echo "$FILENAME" | cut -d'_' -f2)

            # 임시 파일에 오버레이 코드를 먼저 만듭니다 (충돌 방지) ㅡㅡ
            cat <<'EOF' > overlay.txt
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  #res-overlay {
    width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
                url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=1974&auto=format&fit=crop');
    background-size: cover; background-position: center; font-family: 'Pretendard', sans-serif; color: white; text-align: center;
    position: relative; z-index: 9999;
  }
  .premium-label { font-size: clamp(20px, 6vw, 28px); font-weight: 700; color: #ff00ff; letter-spacing: 1px; margin-bottom: 15px; text-shadow: 0 0 8px rgba(255,0,255,0.8); }
  .main-title { font-size: clamp(38px, 9vw, 80px); font-weight: 700; line-height: 1.2; margin-bottom: 25px; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.8); }
  .main-title span { color: #ffff00; text-shadow: 0 0 20px #ffff00; }
  .status-box { background: rgba(0,0,0,0.8); border: 2px solid #fff; padding: 15px 35px; border-radius: 12px; margin-bottom: 35px; box-shadow: 0 0 20px #fff; animation: boxGlow 1.5s infinite alternate; }
  .status-date { font-size: 18px; color: #ff66ff; margin-bottom: 5px; font-weight: 500; }
  .status-active { font-size: 24px; font-weight: 900; }
  .cta-button { text-decoration: none; font-size: clamp(24px, 6vw, 32px); font-weight: 900; color: #fff; background: linear-gradient(135deg, #ff0000 0%, #ff5500 100%); padding: 22px 60px; border-radius: 60px; border: 3px solid #fff; transition: 0.3s; animation: btnPulse 1.2s infinite; display: inline-block; }
  @keyframes boxGlow { from { box-shadow: 0 0 10px #fff; } to { box-shadow: 0 0 30px #ff00ff; border-color: #ff00ff; } }
  @keyframes btnPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
</style>
<div id='res-overlay'>
  <div class='premium-label'>★ REPLACE_REGION No.1 정보 ★</div>
  <h1 class='main-title'>REPLACE_REGION REPLACE_KEYWORD<br><span>PREMIUM</span></h1>
  <div class='status-box'>
    <p class='status-date'>기준: REPLACE_DATE</p>
    <p class='status-active'>✨ 현재 정상 영업중 ✨</p>
  </div>
  <p style='font-size: 20px; color: #ffff00; margin-bottom: 45px; font-weight: 700; text-shadow: 2px 2px 5px #000;'>압도적인 퀄리티로 모시겠습니다.</p>
  <a href='tel:010-0000-0000' class='cta-button'>📞 전화 즉시 연결</a>
</div>
EOF
            # 키워드 치환 ㅡㅡ
            sed -i "s/REPLACE_REGION/$REGION/g" overlay.txt
            sed -i "s/REPLACE_KEYWORD/$KEYWORD/g" overlay.txt
            sed -i "s/REPLACE_DATE/$TODAY/g" overlay.txt

            # <body> 태그 뒤에 임시 파일 내용을 끼워넣기 ㅡㅡ
            sed -i "/<body[^>]*>/r overlay.txt" "$file"
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Fixed Overlay Injection" || exit 0
          git push
