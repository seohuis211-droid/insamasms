name: Final Push Overlay

on:
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Insert Design
        run: |
          # 9,000개 파일에 형님 디자인 강제 삽입 ㅡㅡ
          find . -name "*.html" | while read -r file; do
            # 파일명에서 지역_키워드 추출
            FILENAME=$(basename "$file" .html)
            REGION=$(echo "$FILENAME" | cut -d'_' -f1)
            KEYWORD=$(echo "$FILENAME" | cut -d'_' -f2)

            # <body> 태그 바로 아래에 형님 소스코드 때려박기
            sed -i "/<body[^>]*>/a \
            <style> \
              @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css'); \
              #res-overlay { width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=1974&auto=format&fit=crop'); background-size: cover; background-position: center; font-family: 'Pretendard', sans-serif; color: white; text-align: center; position: relative; z-index: 9999; } \
              .premium-label { font-size: 24px; color: #ff00ff; margin-bottom: 15px; text-shadow: 0 0 8px #ff00ff; } \
              .main-title { font-size: 60px; font-weight: 700; color: #fff; margin-bottom: 25px; } \
              .status-box { background: rgba(0,0,0,0.8); border: 2px solid #fff; padding: 20px; border-radius: 12px; margin-bottom: 35px; } \
              .cta-button { text-decoration: none; font-size: 30px; font-weight: 900; color: #fff; background: linear-gradient(135deg, #ff0000 0%, #ff5500 100%); padding: 20px 50px; border-radius: 60px; border: 3px solid #fff; display: inline-block; } \
            </style> \
            <div id='res-overlay'> \
              <div class='premium-label'>★ $REGION No.1 정보 ★</div> \
              <h1 class='main-title'>$REGION $KEYWORD<br><span style='color:#ffff00;'>PREMIUM</span></h1> \
              <div class='status-box'> \
                <p style='color:#ff66ff;'>기준: 2026년 03월 25일(수)</p> \
                <p style='font-size:24px; font-weight:900;'>✨ 현재 정상 영업중 ✨</p> \
              </div> \
              <a href='tel:010-0000-0000' class='cta-button'>📞 전화 즉시 예약</a> \
            </div>" "$file"
          done

      - name: Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Insert Overlay" || exit 0
          git push
