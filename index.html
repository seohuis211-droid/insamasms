<script>
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth() + 1;
  const day = today.getDate();
  const dateStr = `${year}년 ${month}월 ${day}일`;
  document.getElementById('current-date').innerText = dateStr + ' 현황';
  document.getElementById('update-date').innerText = '최종 업데이트: ' + dateStr;

  // 백링크 동적 로드 (links.txt 사용, 도메인 비율 적용)
  const LINK_FILE_URL = 'https://asdfaf-cbo.pages.dev/links.txt';
  const DOMAIN_TARGETS = {
    'clicknn.co.kr': 5,
    'korealocalguide.isweb.co.kr': 5,
    'playzone.clickn.co.kr': 5,
    'haipeobeullik.clickn.co.kr': 2,
    'ilpeuro.clickn.co.kr': 2,
    'jjeomoo.clickn.co.kr': 2,
    'karaokee.clickn.co.kr': 2,
    'noraebangg.clickn.co.kr': 2,
    'peobeullik.clickn.co.kr': 2,
    'pulssarong.clickn.co.kr': 2,
    'rumssarong.clickn.co.kr': 2,
    'shirtroomm.clickn.co.kr': 2,
    'tenpeuro.clickn.co.kr': 2
  };
  const TOTAL_PER_PAGE = 15;

  function seededRandom(seed) {
    let m = 0x80000000;
    let a = 1103515245;
    let c = 12345;
    let state = seed % m;
    return function() {
      state = (a * state + c) % m;
      return state / m;
    };
  }

  function selectBacklinks(seed, links, targets) {
    // 도메인별 그룹화
    const domainGroups = {};
    links.forEach(link => {
      try {
        const url = new URL(link.url);
        const domain = url.hostname;
        if (!domainGroups[domain]) domainGroups[domain] = [];
        domainGroups[domain].push(link.full_html);
      } catch(e) {}
    });

    const rng = seededRandom(seed);
    const selected = [];
    for (const [domain, target] of Object.entries(targets)) {
      const group = domainGroups[domain] || [];
      if (group.length === 0) continue;
      const shuffled = [...group];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      const take = Math.min(target, shuffled.length);
      for (let k = 0; k < take; k++) selected.push(shuffled[k]);
    }
    if (selected.length < TOTAL_PER_PAGE) {
      const remaining = TOTAL_PER_PAGE - selected.length;
      const allLinks = links.map(l => l.full_html);
      for (let i = allLinks.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [allLinks[i], allLinks[j]] = [allLinks[j], allLinks[i]];
      }
      for (let i = 0; i < remaining && i < allLinks.length; i++) selected.push(allLinks[i]);
    }
    for (let i = selected.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [selected[i], selected[j]] = [selected[j], selected[i]];
    }
    return selected.slice(0, TOTAL_PER_PAGE);
  }

  fetch(LINK_FILE_URL + '?v=' + Date.now())
    .then(r => r.text())
    .then(text => {
      const anchorRegex = /<a\s[^>]+>.*?<\/a>/g;
      const anchors = text.match(anchorRegex);
      if (!anchors) return;
      const allLinks = anchors.map(a => {
        const hrefMatch = a.match(/href=["']([^"']+)["']/);
        return { full_html: a, url: hrefMatch ? hrefMatch[1] : '' };
      }).filter(l => l.url);
      const seed = (year * 10000 + month * 100 + day) * 10000 + ('index').split('').reduce((a,b)=>a+b.charCodeAt(0),0);
      const backlinks = selectBacklinks(seed, allLinks, DOMAIN_TARGETS);
      const container = document.getElementById('dynamic-backlinks');
      if (container) {
        container.innerHTML = '<div style="padding:10px; text-align:center;">' + backlinks.join(' ') + '</div>';
      }
    })
    .catch(console.error);
</script>
