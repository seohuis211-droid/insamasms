<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, viewport-fit=cover, initial-scale=1.0">
  <meta name="description" content="전국 프리미엄 공간(셔츠룸, 룸싸롱, 가라오케 등)의 실시간 정보, 주대 비교, 실제 후기를 한곳에서 확인하세요. 지역별, 업종별 검색 가능.">
  <title>프리미엄 공간 가이드 | 전국 유흥 정보</title>
  <link rel="canonical" href="https://clicknn.co.kr/">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FT3N52G5LX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FT3N52G5LX');
  </script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Pretendard', sans-serif;
      background: #fff;
      color: #111;
      line-height: 1.5;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }
    .hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      text-align: center;
      padding: 80px 20px;
    }
    .hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .hero p {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 2rem;
    }
    .cta-btn {
      display: inline-block;
      background: #ff5722;
      color: white;
      padding: 12px 30px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.2rem;
      transition: 0.2s;
    }
    .cta-btn:hover {
      background: #e64a19;
      transform: scale(1.02);
    }
    section {
      padding: 60px 0;
      border-bottom: 1px solid #eee;
    }
    h2 {
      font-size: 1.8rem;
      margin-bottom: 30px;
      text-align: center;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
    }
    .card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: 0.2s;
    }
    .card a {
      text-decoration: none;
      color: #333;
      font-weight: 500;
      display: block;
    }
    .card:hover {
      background: #e9ecef;
      transform: translateY(-3px);
    }
    .region-tag {
      display: inline-block;
      background: #f1f3f5;
      padding: 6px 12px;
      margin: 5px;
      border-radius: 30px;
      font-size: 0.9rem;
    }
    .region-tag a {
      text-decoration: none;
      color: #495057;
    }
    .recent-list {
      list-style: none;
      padding: 0;
    }
    .recent-list li {
      margin-bottom: 10px;
    }
    .recent-list a {
      text-decoration: none;
      color: #0066cc;
    }
    footer {
      background: #f1f3f5;
      text-align: center;
      padding: 30px;
      font-size: 0.8rem;
      color: #666;
    }
    @media (max-width: 768px) {
      .hero h1 { font-size: 2rem; }
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    .loader {
      text-align: center;
      padding: 50px;
      font-size: 1.2rem;
      color: #666;
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="container">
    <h1>전국 프리미엄 공간<br>한곳에서 비교하세요</h1>
    <p>실시간 예약 가능 여부, 주대 정보, 생생한 후기까지</p>
    <a href="tel:010-0000-0000" class="cta-btn">📞 전화 예약 문의</a>
  </div>
</div>

<div class="container" id="dynamic-content">
  <div class="loader">페이지 정보를 불러오는 중...</div>
</div>

<footer>
  <p>© 2026 프리미엄 공간 가이드 | <a href="/sitemap.xml">사이트맵</a></p>
  <p>본 사이트는 정보 제공 목적으로 운영되며, 실제 업소와 직접적인 연관이 없습니다.</p>
</footer>

<script>
  // sitemap.xml에서 모든 페이지 URL을 추출
  fetch('/sitemap.xml')
    .then(res => {
      if (!res.ok) throw new Error('사이트맵을 불러올 수 없습니다.');
      return res.text();
    })
    .then(xmlText => {
      // 간단한 파서: <loc> 태그 사이의 URL 추출
      const locMatches = xmlText.match(/<loc>(https?:\/\/[^<]+)<\/loc>/g);
      if (!locMatches) throw new Error('사이트맵에서 URL을 찾을 수 없습니다.');
      
      const urls = locMatches.map(match => {
        const url = match.replace(/<\/?loc>/g, '');
        return url;
      });

      // /pages/... 형식의 URL만 추출하고 slug와 제목(자동 생성) 추출
      const pages = [];
      urls.forEach(url => {
        const match = url.match(/\/pages\/([^\/]+)$/);
        if (match) {
          const slug = match[1];
          // slug를 보기 좋게 변환 (간단한 예: 하이픈을 공백으로, 첫 글자 대문자 등)
          let title = slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
          pages.push({ slug, title, url });
        }
      });

      if (pages.length === 0) throw new Error('페이지 정보가 없습니다.');

      // 지역 목록 추출 (slug의 첫 부분)
      const regionsSet = new Set();
      pages.forEach(p => {
        const firstPart = p.slug.split('-')[0];
        if (firstPart) regionsSet.add(firstPart);
      });
      const regions = Array.from(regionsSet).slice(0, 20); // 최대 20개

      // 업종별 대표 페이지 (간단한 키워드 매칭)
      const categoryKeywords = {
        '셔츠룸': 'shirtroom',
        '룸싸롱': 'roomsalong',
        '풀싸롱': 'fullsalon',
        '가라오케': 'karaoke',
        '퍼블릭': 'public',
        '텐프로': 'tenpro'
      };
      const categoryPages = {};
      for (let [name, keyword] of Object.entries(categoryKeywords)) {
        const found = pages.find(p => p.slug.includes(keyword));
        if (found) categoryPages[name] = found;
      }
      // 못 찾으면 첫 페이지 사용
      const categories = Object.entries(categoryKeywords).map(([name]) => ({
        name,
        page: categoryPages[name] || pages[0]
      }));

      // 최신 페이지 (마지막 20개)
      const recent = pages.slice(-20).reverse();

      // 랜덤 추천 (20개)
      const shuffled = [...pages];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      const random = shuffled.slice(0, 20);

      // HTML 생성
      let html = `
        <section>
          <h2>✨ 인기 업종</h2>
          <div class="grid">
            ${categories.map(cat => `
              <div class="card"><a href="/pages/${cat.page.slug}">${cat.name}</a></div>
            `).join('')}
          </div>
        </section>

        <section>
          <h2>📍 지역별 찾기</h2>
          <div style="text-align: center;">
            ${regions.map(region => `
              <span class="region-tag"><a href="/pages/${region}">${region}</a></span>
            `).join('')}
          </div>
          <p style="text-align:center; margin-top:15px; font-size:0.9rem; color:#666;">
            ※ 지역명을 클릭하면 해당 지역의 첫 페이지로 이동합니다.
          </p>
        </section>

        <section>
          <h2>🆕 최신 업데이트</h2>
          <ul class="recent-list">
            ${recent.map(p => `<li><a href="/pages/${p.slug}">${p.title}</a></li>`).join('')}
          </ul>
        </section>

        <section>
          <h2>🎲 오늘의 추천</h2>
          <ul class="recent-list">
            ${random.map(p => `<li><a href="/pages/${p.slug}">${p.title}</a></li>`).join('')}
          </ul>
        </section>
      `;
      document.getElementById('dynamic-content').innerHTML = html;
    })
    .catch(err => {
      document.getElementById('dynamic-content').innerHTML = `
        <div class="loader">
          <p>⚠️ 페이지 정보를 불러오지 못했습니다.</p>
          <p>잠시 후 다시 시도해주세요.</p>
        </div>
      `;
      console.error(err);
    });
</script>

</body>
</html>
