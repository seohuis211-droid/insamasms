              "bundang": "분당", "yatap": "야탑", "seohyun": "서현", "jeongjadong": "정자동",
              "seongnam": "성남", "sillim": "신림", "jonggak": "종각", "myeongdong": "명동",
              "pangyo": "판교", "sunae": "수내", "migeum": "미금", "jukjeon": "죽전",
              "yeouido": "여의도", "yeongdeungpo": "영등포", "guro": "구로", "daelim": "대림",
              "dongjak": "동작", "hapjeong": "합정", "yongsan": "용산", "hongdae": "홍대",
              "sinchon": "신촌", "gangseo": "강서", "yeonsinnae": "연신내", "magok": "마곡",
              "balsan": "발산", "hwagok": "화곡", "kkachisan": "까치산", "incheon": "인천",
              "juan": "주안", "seokbawi": "석바위", "yeonsudong": "연수동", "michuhol": "미추홀",
              "bucheon": "부천", "bupyeong": "부평", "uijeongbu": "의정부", "apgujeong": "압구정",
              "sinsa": "신사", "jamwondong": "잠원동", "banpo": "반포", "bangbae": "방배",
              "isu": "이수", "eonju": "언주", "cheongdam": "청담", "daechidong": "대치동",
              "dogok": "도곡", "jamsil": "잠실", "songpa": "송파", "seokchon": "석촌",
              "garakdong": "가락동", "bangidong": "방이동", "bongcheondong": "봉천동",
              "wangsimni": "왕십리", "euljiro": "을지로", "dongmyo": "동묘", "chungmuro": "충무로",
              "gwanghwamun": "광화문", "janghanpyeong": "장한평", "dapsimni": "답십리",
              "ilsan": "일산", "tanhyeon": "탄현", "madu": "마두", "baekseok": "백석",
              "paju": "파주", "goyang": "고양", "lapesta": "라페스타", "janghangdong": "장항동",
              "gimpo": "김포", "ingyedong": "인계동", "suwon": "수원", "gwanggyo": "광교",
              "yeongtong": "영통", "dongtan": "동탄", "maetandong": "매탄동", "maesandong": "매산동",
              "mangpodong": "망포동", "hyangnam": "향남", "singaldong": "신갈동", "giheung": "기흥",
              "gunpo": "군포", "osan": "오산", "gwonseondong": "권선동", "hwaseodong": "화서동",
              "beomgye": "범계", "geumgokdong": "금곡동", "yongin": "용인", "seoul": "서울",
              "changdong": "창동", "cheolsan": "철산", "nowon": "노원", "guri": "구리",
              "mapo": "마포", "idae": "이대", "dangsan": "당산", "seodaemun": "서대문",
              "guuidong": "구의동", "jayangdong": "자양동", "gwangjin": "광진구", "dongdaemun": "동대문", "jangandong": "장안동", "garaksijang": "가락시장"
          }

          keyword_map = {
              "public": "퍼블릭", "highpublic": "하이퍼블릭", "hyper": "하퍼", "shirtroom": "셔츠룸",
              "fullsalong": "풀싸롱", "roomsalong": "룸싸롱", "noraebang": "노래방",
              "karaoke": "가라오케", "touchroom": "터치룸", "roombbang": "룸빵",
              "room": "룸", "jjomo": "쩜오", "noraeppa": "노래빠", "yuheung": "유흥",
              "yuheungjujeom": "유흥주점", "tenpro": "텐프로", "tencafe": "텐카페", "threeno": "쓰리노",
              "sky": "스카이", "hive": "하이브", "bar": "바", "phantom": "팬텀", "return": "리턴",
              "creed": "크리드", "apple": "애플", "louis": "루이스", "mooncrystal": "문크리스탈",
              "ilpro": "일프로", "root": "루트", "codeone": "코드원", "louise": "루이즈",
              "heritage": "헤리티지", "yacht": "요트", "frequency": "주파수", "objet": "오브제",
              "baji": "바지", "alphabet": "알파벳", "mulligan": "멀리건", "theglory": "더글로리",
              "someday": "썸데이", "blending": "블렌딩", "kingsman": "킹스맨", "f1": "에프원",
              "another": "어나더", "label": "레이블", "shiny": "샤이니", "dokkaebi": "도깨비",
              "impact": "임팩트", "rising": "라이징", "intro": "인트로", "miracle": "미라클",
              "aone": "에이원", "unique": "유니크", "good": "좋아요", "siren": "세이렌",
              "epro": "이프로", "aurora": "오로라", "people": "피플", "gallery": "갤러리",
              "tambourine": "템버린", "apt": "아파트", "oscar": "오스카", "wembley": "웸블리",
              "okay": "괜찮아", "aura": "아우라", "theopen": "디오픈", "basic": "베이직",
              "pine": "소나무", "contents": "콘텐츠", "white": "화이트", "times": "타임즈",
              "class": "클라쓰", "maybe": "메이비", "homerunball": "홈런볼", "mg": "엠지",
              "face": "페이스", "id": "아이디", "quality": "퀄리티", "zeus": "제우스",
              "oneonefive": "115", "dalto": "달토", "dallineuntokki": "달리는토끼",
              "runningrabbit": "런닝레빗", "runningraebit": "런닝래빗", "dasoda": "다소다",
              "dopamine": "도파민", "elite": "엘리트", "trend": "트렌드", "arboretum": "수목원",
              "perfect": "퍼펙트", "worklife": "워라벨", "bulletproof": "방탄",
              "youandme": "유앤미", "again": "어게인", "boston": "보스턴", "blackhole": "블랙홀", "flirting": "플러팅"
          }

          overlay_template = """
          <style id="overlay-style">
            @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
            #res-overlay {{ width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=1974&auto=format&fit=crop'); background-size: cover; background-position: center; font-family: 'Pretendard', sans-serif; color: white; text-align: center; position: relative; z-index: 9999; }}
            .premium-label {{ font-size: 24px; font-weight: 700; color: #ff00ff; margin-bottom: 15px; text-shadow: 0 0 8px rgba(255,0,255,0.8); }}
            .main-title {{ font-size: 60px; font-weight: 700; line-height: 1.2; margin-bottom: 25px; color: #fff; }}
            .status-box {{ background: rgba(0,0,0,0.8); border: 2px solid #fff; padding: 15px 35px; border-radius: 12px; margin-bottom: 35px; box-shadow: 0 0 20px #fff; }}
            .cta-button {{ text-decoration: none; font-size: 32px; font-weight: 900; color: #fff; background: linear-gradient(135deg, #ff0000 0%, #ff5500 100%); padding: 20px 60px; border-radius: 60px; border: 3px solid #fff; display: inline-block; }}
          </style>
          <div id='res-overlay'>
            <div class='premium-label'>★ {r_kor} No.1 정보 ★</div>
            <h1 class='main-title'>{r_kor} {k_kor}<br><span style='color:#ffff00;'>PREMIUM</span></h1>
            <div class='status-box'>
              <p style='color:#ff66ff; font-size:18px;'>기준: 2026년 03월 25일(수)</p>
              <p style='font-size:24px; font-weight:900;'>✨ 현재 정상 영업중 ✨</p>
            </div>
            <a href='tel:010-0000-0000' class='cta-button'>📞 전화 즉시 예약</a>
          </div>
          """

          files = glob.glob("**/*.html", recursive=True)
          for f_path in files:
              try:
                  with open(f_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  
                  # 1. 기존에 잘못 들어간 오버레이 코드 제거 (ID나 특정 클래스로 찾아서 삭제) ㅡㅡ
                  content = re.sub(r'<style id="overlay-style">.*?</style>', '', content, flags=re.DOTALL)
                  content = re.sub(r'<div id=\'res-overlay\'>.*?</div>', '', content, flags=re.DOTALL)
                  content = re.sub(r'<div id="res-overlay">.*?</div>', '', content, flags=re.DOTALL)

                  # 2. 파일명에서 한글 매핑 ㅡㅡ
                  fname = os.path.basename(f_path).replace(".html", "")
                  parts = fname.split('_')
                  r_eng = parts[0] if len(parts) > 0 else ""
                  k_eng = parts[1] if len(parts) > 1 else ""
                  r_kor = region_map.get(r_eng, r_eng)
                  k_kor = keyword_map.get(k_eng, k_eng)

                  # 3. 깨끗해진 파일에 새 한글 코드 삽입 ㅡㅡ
                  if "<body>" in content:
                      final_html = overlay_template.format(r_kor=r_kor, k_kor=k_kor)
                      new_content = content.replace("<body>", f"<body>{final_html}", 1)
                      with open(f_path, 'w', encoding='utf-8') as f:
                          f.write(new_content)
              except Exception as e:
                  print(f"Error in {f_path}: {e}")

      - name: Push Cleaned Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Cleaned old overlays and applied Korean mapping" || exit 0
          git push
