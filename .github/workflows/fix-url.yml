name: Bulk Replace URL

on:
  workflow_dispatch: 

# 서버에 '쓰기' 권한을 확실히 부여합니다 ㅡㅡ
permissions:
  contents: write

jobs:
  replace-url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 최신 v4로 변경 (Node.js 경고 해결)

      - name: Replace URL in all HTML files
        run: |
          # 20만 개 파일을 'sed' 명령어로 서버에서 직접 박멸
          find . -name "*.html" -exec sed -i 's/insamasms.pages.dev/clicknn.co.kr/g' {} +

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 바뀐 게 없으면 에러 안 나게 처리
          git commit -m "Bulk replace domain to clicknn.co.kr" || exit 0
          git push
