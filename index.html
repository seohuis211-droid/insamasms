  <div class="status-box">

    <div class="loader">페이지 정보를 불러오는 중...</div>
  </div>
  <div id="backlinks-container" class="backlinks-accordion"></div>
</div>

<script>
  // ==================== 도메인 비율 (하위 페이지와 동일) ====================
  const DOMAIN_TARGETS = {
    "clicknn.co.kr": 5,
    "korealocalguide.isweb.co.kr": 5,
    "playzone.clickn.co.kr": 5,
    "haipeobeullik.clickn.co.kr": 2,
    "ilpeuro.clickn.co.kr": 2,
    "jjeomoo.clickn.co.kr": 2,
    "karaokee.clickn.co.kr": 2,
    "noraebangg.clickn.co.kr": 2,
    "peobeullik.clickn.co.kr": 2,
    "pulssarong.clickn.co.kr": 2,
    "rumssarong.clickn.co.kr": 2,
    "shirtroomm.clickn.co.kr": 2,
    "tenpeuro.clickn.co.kr": 2
  };
  const TOTAL_PER_PAGE = 15;

  // 오늘 날짜 및 시드
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth() + 1;
  const day = today.getDate();
  document.getElementById('current-date').innerText = `${year}년 ${month}월 ${day}일 현황`;
  const dateSeed = year * 10000 + month * 100 + day;

  // 시드 기반 난수 생성기
  function seededRandom(seed) {
    let state = seed;
    return function() {
      state = (state * 1103515245 + 12345) & 0x7fffffff;
      return state / 0x7fffffff;
    };
  }

  // 도메인별로 링크 그룹화 + 각 링크의 slug, 제목 추출
  async function loadLinks() {
    try {
      const res = await fetch('https://asdfaf-cbo.pages.dev/links.txt?v=' + Date.now());
      if (!res.ok) throw new Error('링크 파일 로드 실패');
      const text = await res.text();
      const anchorRegex = /<a\s[^>]+>.*?<\/a>/g;
      const anchors = text.match(anchorRegex);
      if (!anchors || anchors.length === 0) throw new Error('링크 없음');

      // 각 링크 정보 파싱
      const allLinks = [];
      for (const a of anchors) {
        const hrefMatch = a.match(/href=["']([^"']+)["']/);
        if (!hrefMatch) continue;
        const url = hrefMatch[1];
        let domain;
        try {
          domain = new URL(url).hostname;
        } catch(e) { continue; }
        const name = a.replace(/<[^>]+>/g, '').trim();
        const slug = url.split('/').pop();
        allLinks.push({ url, domain, name, fullHtml: a, slug });
      }

      // 도메인별 그룹화
      const domainGroups = {};
      for (const link of allLinks) {
        if (DOMAIN_TARGETS[link.domain]) {
          if (!domainGroups[link.domain]) domainGroups[link.domain] = [];
          domainGroups[link.domain].push(link);
        }
      }

      // 1. 인기 업종 (키워드 기반)
      const categoryKeywords = {
        '셔츠룸': 'shirtroom',
        '룸싸롱': 'roomsalong',
        '풀싸롱': 'fullsalon',
        '가라오케': 'karaoke',
        '퍼블릭': 'public',
        '텐프로': 'tenpro'
      };
      const categories = [];
      for (const [name, keyword] of Object.entries(categoryKeywords)) {
        const found = allLinks.find(link => link.slug.includes(keyword));
        if (found) {
          categories.push({ name, url: found.url, slug: found.slug });
        } else {
          // 없으면 그냥 첫 링크
          categories.push({ name, url: allLinks[0].url, slug: allLinks[0].slug });
        }
      }

      // 2. 지역별 찾기 (slug 첫 부분 추출)
      const regionMap = new Map(); // region -> 대표 링크
      for (const link of allLinks) {
        const parts = link.slug.split('-');
        if (parts.length < 2) continue;
        const region = parts[0];
        if (!regionMap.has(region)) regionMap.set(region, link);
      }
      const regions = Array.from(regionMap.keys()).slice(0, 20);

      // 3. 최신 업데이트 (링크 파일 순서대로 최근 20개 - 여기서는 마지막 20개)
      const recent = allLinks.slice(-20).reverse();

      // 4. 오늘의 추천 (날짜 시드로 랜덤 20개)
      const rng = seededRandom(dateSeed);
      const shuffled = [...allLinks];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      const randomPicks = shuffled.slice(0, 20);

      // 5. 백링크 (도메인 비율대로 15개 선택)
      const backRng = seededRandom(dateSeed);
      const selectedBacklinks = [];
      for (const [domain, target] of Object.entries(DOMAIN_TARGETS)) {
        const group = domainGroups[domain] || [];
        if (group.length === 0) continue;
        const take = Math.min(target, group.length);
        const shuffledGroup = [...group];
        for (let i = shuffledGroup.length - 1; i > 0; i--) {
          const j = Math.floor(backRng() * (i + 1));
          [shuffledGroup[i], shuffledGroup[j]] = [shuffledGroup[j], shuffledGroup[i]];
        }
        selectedBacklinks.push(...shuffledGroup.slice(0, take));
      }
      if (selectedBacklinks.length < TOTAL_PER_PAGE) {
        const remaining = TOTAL_PER_PAGE - selectedBacklinks.length;
        const all = allLinks.slice();
        for (let i = all.length - 1; i > 0; i--) {
          const j = Math.floor(backRng() * (i + 1));
          [all[i], all[j]] = [all[j], all[i]];
        }
        selectedBacklinks.push(...all.slice(0, remaining));
      }
      const finalBacklinks = selectedBacklinks.slice(0, TOTAL_PER_PAGE);

      // HTML 생성 (SEO 영역)
      let seoHtml = `
        <h1 style="font-size:2rem; text-align:center; margin-bottom:1rem;">전국 프리미엄 공간 가이드</h1>
        <p style="text-align:center; margin-bottom:2rem;">실시간 정보, 주대 비교, 생생한 후기</p>

        <section>
          <h2>✨ 인기 업종</h2>
          <div class="grid">
            ${categories.map(cat => `<div class="card"><a href="${cat.url}">${cat.name}</a></div>`).join('')}
          </div>
        </section>

        <section>
          <h2>📍 지역별 찾기</h2>
          <div style="text-align: center;">
            ${regions.map(region => {
              const link = regionMap.get(region);
              return link ? `<span class="region-tag"><a href="${link.url}">${region}</a></span>` : '';
            }).join('')}
          </div>
          <p style="text-align:center; margin-top:15px; font-size:0.9rem; color:#666;">※ 지역명을 클릭하면 해당 지역의 대표 페이지로 이동합니다.</p>
        </section>

        <section>
          <h2>🆕 최신 업데이트</h2>
          <ul class="recent-list">
            ${recent.map(link => `<li><a href="${link.url}">${link.name}</a></li>`).join('')}
          </ul>
        </section>

        <section>
          <h2>🎲 오늘의 추천</h2>
          <ul class="recent-list">
            ${randomPicks.map(link => `<li><a href="${link.url}">${link.name}</a></li>`).join('')}
          </ul>
        </section>

        <footer>
          <p>© 2026 프리미엄 공간 가이드 | <a href="/sitemap.xml">사이트맵</a></p>
        </footer>
      `;
      document.getElementById('seo-content').innerHTML = seoHtml;

      // 백링크 HTML
      const backlinksHtml = '<div style="padding:10px; text-align:center;">' + finalBacklinks.map(l => l.fullHtml).join(' ') + '</div>';
      document.getElementById('backlinks-container').innerHTML = backlinksHtml;

    } catch (err) {
      console.error(err);
      document.getElementById('seo-content').innerHTML = `<div class="loader">⚠️ 정보를 불러오지 못했습니다.</div>`;
    }
  }

  loadLinks();
</script>
