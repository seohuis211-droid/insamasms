<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, viewport-fit=cover, initial-scale=1.0">
  <meta name="description" content="전국 프리미엄 공간(셔츠룸, 룸싸롱, 가라오케 등)의 실시간 정보, 주대 비교, 실제 후기를 한곳에서 확인하세요.">
  <title>프리미엄 공간 가이드 | 전국 유흥 정보</title>
  <link rel="canonical" href="https://clicknn.co.kr/">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FT3N52G5LX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FT3N52G5LX');
  </script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Pretendard', sans-serif;
      background: #000;
      line-height: 1.5;
    }
    /* 사용자에게 보이는 예약 오버레이 */
    #res-overlay {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
                  url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=1974&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      color: white;
      text-align: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }
    .premium-label {
      font-size: 28px;
      font-weight: 700;
      color: #ff00ff;
      margin-bottom: 15px;
      text-shadow: 0 0 10px rgba(255,0,255,0.8);
    }
    .main-title {
      font-size: 50px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 35px;
      letter-spacing: -1px;
    }
    .main-title span { color: #ffff00; }
    .status-box {
      background: rgba(0,0,0,0.8);
      border: 2px solid #fff;
      padding: 20px 40px;
      border-radius: 15px;
      margin-bottom: 45px;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }
    .cta-button {
      text-decoration: none;
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      background: linear-gradient(135deg, #ff0000 0%, #ff5500 100%);
      padding: 25px 80px;
      border-radius: 100px;
      border: 4px solid #fff;
      display: inline-block;
      transition: all 0.2s ease;
      box-shadow: 0 10px 30px rgba(255,0,0,0.4);
    }
    .cta-button:active {
      transform: scale(0.95);
      box-shadow: 0 5px 15px rgba(255,0,0,0.3);
    }
    /* 숨김 SEO 영역 (구글봇은 읽음, 사용자 안 보임) */
    .hidden-seo-content {
      position: absolute;
      left: -9999px;
      top: -9999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
    .content-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #fff;
      color: #333;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
    }
    .card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .card a {
      text-decoration: none;
      color: #333;
      font-weight: 500;
      display: block;
    }
    .region-tag {
      display: inline-block;
      background: #f1f3f5;
      padding: 6px 12px;
      margin: 5px;
      border-radius: 30px;
      font-size: 0.9rem;
    }
    .region-tag a {
      text-decoration: none;
      color: #495057;
    }
    .recent-list {
      list-style: none;
      padding: 0;
    }
    .recent-list li {
      margin-bottom: 10px;
    }
    .recent-list a {
      text-decoration: none;
      color: #0066cc;
    }
    footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      text-align: center;
      font-size: 0.8rem;
      color: #666;
    }
    .loader {
      text-align: center;
      padding: 50px;
      font-size: 1.2rem;
      color: #666;
    }
  </style>
</head>
<body>

<div id="res-overlay">
  <div class="premium-label">★ PREMIUM VVIP ★</div>
  <h1 class="main-title">전국 프리미엄 공간<br><span>한곳에서 비교하세요</span></h1>
  <div class="status-box">
    <p style="color:#ff66ff; font-size:18px; margin: 0 0 10px 0;" id="current-date"></p>
    <p style="font-size:28px; font-weight:900; margin: 0;">✨ 현재 정상 영업 중 ✨</p>
  </div>
  <a href="tel:010-0000-0000" class="cta-button">📞 전화 예약하기</a>
</div>

<div class="hidden-seo-content">
  <div id="seo-content" class="content-wrapper">
    <div class="loader">페이지 정보를 불러오는 중...</div>
  </div>
  <div id="backlinks-container" class="backlinks-accordion"></div>
</div>

<script>
  // 도메인 비율 (하위 페이지와 동일)
  const DOMAIN_TARGETS = {
    "clicknn.co.kr": 5,
    "korealocalguide.isweb.co.kr": 5,
    "playzone.clickn.co.kr": 5,
    "haipeobeullik.clickn.co.kr": 2,
    "ilpeuro.clickn.co.kr": 2,
    "jjeomoo.clickn.co.kr": 2,
    "karaokee.clickn.co.kr": 2,
    "noraebangg.clickn.co.kr": 2,
    "peobeullik.clickn.co.kr": 2,
    "pulssarong.clickn.co.kr": 2,
    "rumssarong.clickn.co.kr": 2,
    "shirtroomm.clickn.co.kr": 2,
    "tenpeuro.clickn.co.kr": 2
  };
  const TOTAL_PER_PAGE = 15;

  // 오늘 날짜 및 시드
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth() + 1;
  const day = today.getDate();
  document.getElementById('current-date').innerText = `${year}년 ${month}월 ${day}일 현황`;

  const dateSeed = year * 10000 + month * 100 + day;

  // 시드 기반 난수 생성기
  function seededRandom(seed) {
    let state = seed;
    return function() {
      state = (state * 1103515245 + 12345) & 0x7fffffff;
      return state / 0x7fffffff;
    };
  }

  // 1. pages-list.json 로드 및 본문 생성
  async function loadPageList() {
    try {
      const res = await fetch('/pages-list.json');
      if (!res.ok) throw new Error('페이지 목록 로드 실패');
      const pages = await res.json();

      // 지역별 대표 페이지 (slug 첫 단어)
      const regionToFirstPage = new Map();
      pages.forEach(p => {
        const parts = p.slug.split('-');
        if (parts.length < 2) return;
        const region = parts[0];
        if (!regionToFirstPage.has(region)) regionToFirstPage.set(region, p);
      });
      const regions = Array.from(regionToFirstPage.keys()).slice(0, 20);

      // 업종별 대표 페이지
      const categoryKeywords = {
        '셔츠룸': 'shirtroom',
        '룸싸롱': 'roomsalong',
        '풀싸롱': 'fullsalon',
        '가라오케': 'karaoke',
        '퍼블릭': 'public',
        '텐프로': 'tenpro'
      };
      const categoryPages = {};
      for (const [name, keyword] of Object.entries(categoryKeywords)) {
        const found = pages.find(p => p.slug.includes(keyword));
        categoryPages[name] = found || pages[0];
      }
      const categories = Object.keys(categoryKeywords).map(name => ({ name, page: categoryPages[name] }));

      // 최신 페이지 (마지막 20개)
      const recent = pages.slice(-20).reverse();

      // 오늘의 추천 (날짜 시드 기반 셔플)
      const rng = seededRandom(dateSeed);
      const shuffled = [...pages];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      const randomPicks = shuffled.slice(0, 20);

      // HTML 생성
      let html = `
        <h1 style="font-size:2rem; text-align:center; margin-bottom:1rem;">전국 프리미엄 공간 가이드</h1>
        <p style="text-align:center; margin-bottom:2rem;">실시간 정보, 주대 비교, 생생한 후기</p>

        <section>
          <h2>✨ 인기 업종</h2>
          <div class="grid">
            ${categories.map(cat => `<div class="card"><a href="/pages/${cat.page.slug}">${cat.name}</a></div>`).join('')}
          </div>
        </section>

        <section>
          <h2>📍 지역별 찾기</h2>
          <div style="text-align: center;">
            ${regions.map(region => {
              const page = regionToFirstPage.get(region);
              return page ? `<span class="region-tag"><a href="/pages/${page.slug}">${region}</a></span>` : '';
            }).join('')}
          </div>
          <p style="text-align:center; margin-top:15px; font-size:0.9rem; color:#666;">※ 지역명을 클릭하면 해당 지역의 대표 페이지로 이동합니다.</p>
        </section>

        <section>
          <h2>🆕 최신 업데이트</h2>
          <ul class="recent-list">
            ${recent.map(p => `<li><a href="/pages/${p.slug}">${p.title}</a></li>`).join('')}
          </ul>
        </section>

        <section>
          <h2>🎲 오늘의 추천</h2>
          <ul class="recent-list">
            ${randomPicks.map(p => `<li><a href="/pages/${p.slug}">${p.title}</a></li>`).join('')}
          </ul>
        </section>

        <footer>
          <p>© 2026 프리미엄 공간 가이드 | <a href="/sitemap.xml">사이트맵</a></p>
        </footer>
      `;
      document.getElementById('seo-content').innerHTML = html;
    } catch (err) {
      document.getElementById('seo-content').innerHTML = `<div class="loader">⚠️ 페이지 정보를 불러오지 못했습니다.</div>`;
      console.error(err);
    }
  }

  // 2. links.txt에서 백링크 가져와서 도메인 비율로 선택 (외부 URL)
  async function loadBacklinks() {
    try {
      const res = await fetch('https://asdfaf-cbo.pages.dev/links.txt?v=' + Date.now());
      if (!res.ok) throw new Error('링크 파일 로드 실패');
      const text = await res.text();
      const anchorRegex = /<a\s[^>]+>.*?<\/a>/g;
      const anchors = text.match(anchorRegex);
      if (!anchors || anchors.length === 0) return;

      // 도메인별 그룹화
      const domainGroups = {};
      for (const a of anchors) {
        const hrefMatch = a.match(/href=["']([^"']+)["']/);
        if (!hrefMatch) continue;
        const url = hrefMatch[1];
        let domain;
        try {
          domain = new URL(url).hostname;
        } catch(e) { continue; }
        if (DOMAIN_TARGETS[domain]) {
          if (!domainGroups[domain]) domainGroups[domain] = [];
          domainGroups[domain].push(a);
        }
      }

      // 시드 기반 선택
      const rng = seededRandom(dateSeed);
      const selected = [];
      for (const [domain, target] of Object.entries(DOMAIN_TARGETS)) {
        const group = domainGroups[domain] || [];
        if (group.length === 0) continue;
        const take = Math.min(target, group.length);
        // 간단히 섞어서 앞에서 take개 선택 (시드 기반 셔플)
        const shuffled = [...group];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(rng() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        selected.push(...shuffled.slice(0, take));
      }
      // 부족하면 전체에서 추가
      if (selected.length < TOTAL_PER_PAGE) {
        const remaining = TOTAL_PER_PAGE - selected.length;
        const all = anchors.slice();
        for (let i = all.length - 1; i > 0; i--) {
          const j = Math.floor(rng() * (i + 1));
          [all[i], all[j]] = [all[j], all[i]];
        }
        selected.push(...all.slice(0, remaining));
      }
      // 최종 15개
      const finalLinks = selected.slice(0, TOTAL_PER_PAGE);
      const backlinksHtml = '<div style="padding:10px; text-align:center;">' + finalLinks.join(' ') + '</div>';
      document.getElementById('backlinks-container').innerHTML = backlinksHtml;
    } catch (err) {
      console.error('백링크 로드 실패:', err);
    }
  }

  // 실행
  loadPageList();
  loadBacklinks();
</script>

</body>
</html>
