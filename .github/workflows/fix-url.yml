name: Clean and Re-Inject Korean Overlay

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean-and-inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Python Cleanup & Injection
        shell: python
        run: |
          import os
          import glob
          import re

          # 형님이 주신 매핑 데이터 그대로 사용 ㅡㅡ
          region_map = {
              "gyodae": "교대", "sinnonhyeon": "신논현", "yangjae": "양재", "samsung": "삼성",
              "seolleung": "선릉", "nonhyeon": "논현", "yeoksam": "역삼", "itaewon": "이태원",
